<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJ LOGIN SYSTEM</title>

<style>

body{
background: radial-gradient(circle,#1a0000,#000);
font-family: Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
width:320px;
background:#111;
border:2px solid red;
border-radius:20px;
padding:25px;
text-align:center;
box-shadow:0 0 30px red;
}

.logo{
width:220px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 25px red;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
background:black;
color:white;
font-size:15px;
}

button{
width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#ff0000,#ff6a00);
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.paste{
margin-top:10px;
cursor:pointer;
color:#ff6a00;
font-size:14px;
}

#msg{
margin-top:10px;
font-weight:bold;
height:20px;
}

.loader{
display:none;
margin-top:10px;
}

</style>
</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<input id="key" placeholder="ENTER KEY">

<button onclick="login()">LOGIN</button>

<div class="paste" onclick="pasteKey()">PASTE</div>

<div class="loader" id="loader">Checking key...</div>

<div id="msg"></div>

</div>

<script>

let API_LINK="https://api.npoint.io/c73873447f52b0f35fb8"

async function login(){

let userKey=document.getElementById("key").value
let msg=document.getElementById("msg")
let loader=document.getElementById("loader")

msg.innerHTML=""
loader.style.display="block"

try{

let res=await fetch(API_LINK + "?t=" + new Date().getTime())
let data=await res.json()

loader.style.display="none"

if(userKey===data.key){

window.location.href=data.redirect

}else{

msg.innerHTML="INVALID OR EXPIRED KEY"
msg.style.color="red"

setTimeout(()=>{
msg.innerHTML=""
},5000)

}

}catch{

loader.style.display="none"

msg.innerHTML="SERVER ERROR"
msg.style.color="red"

setTimeout(()=>{
msg.innerHTML=""
},5000)

}

}

async function pasteKey(){

let text=await navigator.clipboard.readText()
document.getElementById("key").value=text

}

</script>

</body>
</html>
