<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJ LOGIN SYSTEM</title>

<style>

body{
background: radial-gradient(circle,#1a0000,#000);
font-family: Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
overflow:hidden;
}

/* PARTICLES */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:radial-gradient(red 1px,transparent 1px);
background-size:40px 40px;
opacity:0.2;
animation:move 20s linear infinite;
}

@keyframes move{
0%{transform:translateY(0)}
100%{transform:translateY(-200px)}
}

.box{
width:320px;
background:#111;
border:2px solid red;
border-radius:20px;
padding:25px;
text-align:center;
box-shadow:0 0 30px red;
position:relative;
z-index:2;
}

/* LOGO */
.logo{
width:180px;
height:auto;
margin-bottom:15px;
display:block;
margin-left:auto;
margin-right:auto;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{filter:drop-shadow(0 0 5px red)}
to{filter:drop-shadow(0 0 20px red)}
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
background:black;
color:white;
font-size:15px;
}

button{
width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#ff0000,#ff6a00);
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.paste{
margin-top:10px;
cursor:pointer;
color:#ff6a00;
font-size:14px;
}

#msg{
margin-top:10px;
font-weight:bold;
height:20px;
}

.loader{
display:none;
margin-top:10px;
}

/* SUCCESS FLASH */
.success{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,255,0,0.2);
display:none;
z-index:5;
}

</style>
</head>

<body>

<div class="success" id="success"></div>

<div class="box">

<img src="logo.png" class="logo" loading="eager">

<input id="key" placeholder="ENTER KEY">

<button onclick="login()">LOGIN</button>

<div class="paste" onclick="pasteKey()">PASTE</div>

<div class="loader" id="loader">Checking key...</div>

<div id="msg"></div>

</div>

<script>

let API_LINK="https://api.npoint.io/c73873447f52b0f35fb8"

async function login(){

let userKey=document.getElementById("key").value
let msg=document.getElementById("msg")
let loader=document.getElementById("loader")
let success=document.getElementById("success")

msg.innerHTML=""
loader.style.display="block"

try{

let res=await fetch(API_LINK + "?t=" + new Date().getTime())
let data=await res.json()

loader.style.display="none"

if(userKey===data.key){

success.style.display="block"

setTimeout(()=>{
window.location.href=data.redirect
},800)

}else{

msg.innerHTML="INVALID OR EXPIRED KEY"
msg.style.color="red"

setTimeout(()=>{
msg.innerHTML=""
},5000)

}

}catch{

loader.style.display="none"

msg.innerHTML="SERVER ERROR"
msg.style.color="red"

setTimeout(()=>{
msg.innerHTML=""
},5000)

}

}

async function pasteKey(){

let text=await navigator.clipboard.readText()
document.getElementById("key").value=text

}

</script>

</body>
</html>
